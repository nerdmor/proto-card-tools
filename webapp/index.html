<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proto Card Tools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="css/mana.min.css" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet">
    <link href="css/modals.css" rel="stylesheet">
    <link href="css/card-finder.css" rel="stylesheet">
    <link href="css/finder-cards.css" rel="stylesheet">
    <link href="css/table-cards.css" rel="stylesheet">
  </head>
  <body>
    <!-- Modals -->
    <div id="alert-modal" class="modal fade" tabindex="-1" aria-hidden="true"></div>
    <div id="loading-cards-modal" class="modal fade" tabindex="-1" aria-hidden="true"></div>
    <div id="loading-sets-modal" class="modal fade" tabindex="-1" aria-hidden="true"></div>
    <div id="archidekt-file-import-modal" class="modal fade" tabindex="-1" aria-hidden="true"></div>
    <div id="select-card-version-modal" class="modal fade" tabindex="-1" aria-hidden="true"></div>
    <div id="card-details-modal" class="modal fade" tabindex="-1" aria-hidden="true"></div>
    <!-- End of Modals -->



    <div class="container">

      <div id="first-row" class="row">
        <div id="list-importers" class="col-6">
          <div class="row">
            <div class="mb-3">
              <label for="archidekt-file" class="form-label">Archidekt export file</label>
              <input class="form-control" type="file" id="archidekt-file">
            </div>
          </div>

          <div class="row">
            <button class=" btn btn-primary"type="button" data-bs-toggle="modal" data-bs-target="#select-card-version-modal">Launch modal</button>
          </div>
        </div>
        <div id="list-text-entry" class="col-6">
            <label for="list-input-textarea" class="form-label">List entry</label>
            <textarea id="list-input-textarea" class="form-control" rows="5"></textarea>
            <button id="list-import-form" class="btn btn-primary" type="submit">Import from Form</button>
        </div>
      </div>



      <div id="second-row" class="row">
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="js/constants.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/functions.js"></script>
    <script src="js/main-controller.js"></script>
    <script src="js/scryfall.js"></script>
    <script src="js/protocard.js"></script>
    <script src="js/cardlist.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
